name: 🎛️ Daily PLC Challenge

on:
  schedule:
    # 07:00 UTC, weekdays
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  open-challenge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick a question
        id: pick
        run: |
          QUESTION=$(shuf -n 1 reference/daily-questions.txt)
          # Escape for GitHub Actions output
          QUESTION_ESCAPED="${QUESTION//$'\n'/'%0A'}"
          echo "question=$QUESTION_ESCAPED" >> $GITHUB_OUTPUT
          echo "raw=$QUESTION" >> $GITHUB_ENV

      - name: Compose body
        run: |
          cat > /tmp/body.md <<'EOF'
          ## 🎛️ Today's PLC Challenge

          **Question:** $QUESTION_PLACEHOLDER

          ---

          Drop your answer in the comments. Bonus points for:
          - Showing the rung / ST snippet
          - Citing the relevant Bolton chapter
          - Pointing out a manufacturer-specific gotcha

          The community review starts at the end of the day.
          EOF
          sed -i "s|\$QUESTION_PLACEHOLDER|$raw|g" /tmp/body.md

      - name: Open Issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🎛️ Daily Challenge — ${{ steps.pick.outputs.question }}"
          content-filepath: /tmp/body.md
          labels: daily-challenge, sprint-active
