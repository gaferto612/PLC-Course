name: 🎛️ Daily PLC Challenge

on:
  schedule:
    # 07:00 UTC, weekdays
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  open-challenge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pick a question
        id: pick
        run: |
          # Skip blank lines so we never pick an empty question.
          QUESTION=$(grep -v '^[[:space:]]*$' reference/daily-questions.txt | shuf -n 1)
          {
            echo "question<<__Q__"
            echo "$QUESTION"
            echo "__Q__"
          } >> "$GITHUB_OUTPUT"

      - name: Compose body
        env:
          QUESTION: ${{ steps.pick.outputs.question }}
        run: |
          # Use a Python heredoc so we never have to worry about sed escaping
          # for `|`, `&`, `\`, or newlines inside the question.
          python3 - <<'PY'
          import os, pathlib
          q = os.environ["QUESTION"].strip()
          body = f"""## 🎛️ Today's PLC Challenge

          **Question:** {q}

          ---

          Drop your answer in the comments. Bonus points for:
          - Showing the rung / ST snippet
          - Citing the relevant Bolton chapter
          - Pointing out a manufacturer-specific gotcha

          The community review starts at the end of the day.
          """
          pathlib.Path("/tmp/body.md").write_text(body)
          PY

      - name: Open Issue
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🎛️ Daily Challenge — ${{ steps.pick.outputs.question }}"
          content-filepath: /tmp/body.md
          labels: daily-challenge, sprint-active
