name: 🪜 Lab Auto-Grader

on:
  pull_request:
    paths:
      - 'challenge-labs/**/*.st'
      - 'challenge-labs/**/*.il'
      - 'challenge-labs/**/solution.*'

permissions:
  pull-requests: write
  contents: read

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install grader
        run: |
          pip install -r interactive-tools/ladder-simulator/requirements.txt
          pip install pytest pytest-json-report

      - name: Detect changed labs
        id: detect
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | grep -oP 'challenge-labs/lab-[0-9]+-[a-z-]+' | sort -u)
          echo "labs<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run auto-grader
        run: |
          python interactive-tools/ladder-simulator/grader.py \
            --labs "${{ steps.detect.outputs.labs }}" \
            --report /tmp/grade-report.md

      - name: Comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/grade-report.md
