name: 🌐 Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'sprints/**'
      - 'reference/**'
      - 'challenge-labs/**'
      - 'flashcards/**'
      - 'interactive-tools/**'
      - 'visuals/**'
      - 'workbooks/**'
      - 'CONTRIBUTING.md'
      - 'README.md'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs Material
        run: |
          pip install mkdocs-material mkdocs-mermaid2-plugin

      # docs_dir is the project root, so site_dir cannot live anywhere inside
      # the repo. Build to a sibling directory next to the checkout, then copy
      # the rendered site back into the workspace as `_site` for the upload
      # action.
      - name: Build site
        run: |
          mkdocs build --config-file docs/mkdocs.yml
          mv ../_site ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
